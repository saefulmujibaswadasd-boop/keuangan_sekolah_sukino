<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SD NEGERI WONOKERTO</title>
  <link rel="icon" href="assets/Kartini.png" type="image/png">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-100 min-h-screen flex flex-col">

  <!-- Header -->
   <header style="text-align:center; margin-bottom:30px;">
      <header class="bg-blue-600 text-white py-6 shadow-md flex justify-center">
    <div class="w-3/4 max-w-3xl text-center">
  <img src="assets/Kartini.png" alt="Kartini.png" 
       style="height:120px; width:120px; display:block; margin:0 auto; border-radius:50%; object-fit:cover;">
  <h1 style="margin-top:15px;">
    ~ SELAMAT DATANG ~<br>
    DI APLIKASI KEUANGAN SD NE PAK SUKINO MOJOTENGAH
  </h1>
</header>

  <!-- Konten Utama -->
  <main class="flex-grow flex flex-col items-center justify-center space-y-6">
    <!-- Kutipan -->
    <h1 class="text-2xl font-bold text-center" style="color:#1E3A8A;">
  "BINALAH DIRIMU MENJADI ORANG YANG BERKALIBER TINGGI"
</h1>

    <!-- Form Login -->
    <form onsubmit="return login()" class="flex flex-col items-center gap-4 w-64">
      <!-- Username -->
      <input type="text" id="username" name="username"
             class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm"
             placeholder="Masukkan username" required>

      <!-- Password -->
      <input type="password" id="password" name="password"
             class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm"
             placeholder="Masukkan password" required>

      <!-- Tombol Login -->
      <button type="submit"
              class="w-full bg-blue-600 text-white py-2 rounded-lg text-sm font-semibold hover:bg-blue-700 transition">
        Login
      </button>

      <!-- Pesan Error -->
      <p id="error" class="text-red-600 text-sm mt-2 hidden">Username atau password salah!</p>
    </form>
  </main>

  <script>
    function login() {
      const user = document.getElementById("username").value;
      const pass = document.getElementById("password").value;
      const errorMsg = document.getElementById("error");

      if (user === "admin" && pass === "1234") {
        window.location.href = "dashboard.html"; // pindah ke dashboard
        return false;
      } else {
        errorMsg.classList.remove("hidden"); // tampilkan pesan error
        return false;
      }
    }
  </script>
</body>
</html>
